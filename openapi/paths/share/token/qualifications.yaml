get:
  operationId: getShareQualifications
  summary: 共有資格情報取得
  description: トークンを指定して共有された資格情報を取得する
  tags:
    - Share
  security: []

  parameters:
    - in: path
      name: token
      description: トークン
      required: true
      schema:
        type: string
        format: uuid

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../openapi.yaml#/components/schemas/Qualification"
          example:
            $ref: "../../../examples/qualifications/get.json"
    "403":
      $ref: "../../../openapi.yaml#/components/responses/Forbidden"
    "404":
      $ref: "../../../openapi.yaml#/components/responses/NotFound"
    "410":
      $ref: "../../../openapi.yaml#/components/responses/Gone"
