get:
  operationId: getVocabulariesById
  summary: ボキャブラリー取得(ID)
  description: IDを指定してボキャブラリーを取得する
  tags:
    - Vocabulary

  parameters:
    - in: path
      name: vocabularyId
      description: ボキャブラリーID
      required: true
      schema:
        type: string
        format: uuid

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/Vocabulary"
        example:
          $ref: "../../examples/vocabularies/vocabularyId/get.json"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"

put:
  operationId: putVocabulariesById
  summary: ボキャブラリー更新(ID)
  description: ボキャブラリーを更新する
  tags:
    - Vocabulary

  parameters:
    - in: path
      name: vocabularyId
      description: ボキャブラリーID
      required: true
      schema:
        type: string
        format: uuid

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/VocabularyBase"

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/VocabularyId"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"

delete:
  operationId: deleteVocabulariesById
  summary: ボキャブラリー削除(ID)
  description: IDを指定してボキャブラリーを削除する
  tags:
    - Vocabulary

  parameters:
    - in: path
      name: vocabularyId
      description: ボキャブラリーID
      required: true
      schema:
        type: string
        format: uuid

  responses:
    "204":
      description: 正常時
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
