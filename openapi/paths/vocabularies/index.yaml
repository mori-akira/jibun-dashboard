get:
  operationId: getVocabularies
  summary: ボキャブラリー取得
  description: 検索条件を指定してボキャブラリーを取得する
  tags:
    - Vocabulary

  parameters:
    - in: query
      name: vocabularyName
      description: ボキャブラリー名
      required: false
      schema:
        type: string
    - in: query
      name: tags
      description: ボキャブラリータグ
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../openapi.yaml#/components/schemas/Vocabulary"
          example:
            $ref: "../../examples/vocabularies/get.json"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"

post:
  operationId: postVocabularies
  summary: ボキャブラリー登録
  description: ボキャブラリーを登録する
  tags:
    - Vocabulary

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/VocabularyBase"

  responses:
    "201":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/VocabularyId"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
