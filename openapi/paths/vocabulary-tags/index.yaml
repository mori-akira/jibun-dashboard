get:
  operationId: getVocabularyTags
  summary: ボキャブラリータグ取得
  description: 検索条件を指定してボキャブラリータグを取得する
  tags:
    - Vocabulary

  parameters:
    - in: query
      name: vocabularyTag
      description: ボキャブラリータグ
      required: false
      schema:
        type: string

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../openapi.yaml#/components/schemas/VocabularyTag"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"

post:
  operationId: postVocabularyTags
  summary: ボキャブラリータグ登録
  description: ボキャブラリータグを登録する
  tags:
    - Vocabulary

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/VocabularyTagBase"

  responses:
    "201":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/VocabularyTagId"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
