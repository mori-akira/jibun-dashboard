post:
  operationId: postUploadUrl
  summary: アップロードURL取得
  description: ファイルアップロード用の署名付きURLを発行し、取得する
  tags:
    - File

  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            fileId:
              description: ファイルID
              type: string
              format: uuid
            expiresIn:
              description: URLの有効期限（秒）
              type: integer
              minimum: 1
              maximum: 604800

  responses:
    "201":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/UploadUrl"
          example:
            $ref: "../../examples/files/upload-url/get.json"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
