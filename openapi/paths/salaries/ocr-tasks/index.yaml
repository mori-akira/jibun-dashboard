get:
  operationId: getSalaryOcrTasks
  summary: 給与OCRタスク取得
  description: 給与OCRタスクを取得する
  tags:
    - Salary

  parameters:
    - in: query
      name: targetDate
      description: 対象年月日
      required: true
      schema:
        type: string
        format: date

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../openapi.yaml#/components/schemas/SalaryOcrTask"
          example:
            $ref: "../../../examples/salaries/ocr-tasks/get.json"
    "400":
      $ref: "../../../openapi.yaml#/components/responses/BadRequest"

post:
  operationId: postSalaryOcrTasks
  summary: 給与OCRタスク開始
  description: 給与OCRタスクを開始する
  tags:
    - Salary

  requestBody:
    content:
      application/json:
        schema:
          type: object
          required:
            - targetDate
            - fileId
          properties:
            targetDate:
              type: string
              description: 対象年月日
              format: date
            fileId:
              type: string
              description: ファイルID
              format: uuid

  responses:
    "202":
      description: 正常時(タスク受付)
      content:
        application/json:
          schema:
            $ref: "../../../openapi.yaml#/components/schemas/SalaryOcrTaskId"
    "400":
      $ref: "../../../openapi.yaml#/components/responses/BadRequest"
