delete:
  operationId: deleteVocabularyQuizHistoriesById
  summary: ボキャブラリークイズ履歴削除 (ID)
  description: IDを指定してボキャブラリークイズ履歴を削除する
  tags:
    - Vocabulary

  parameters:
    - in: path
      name: quizHistoryId
      description: クイズ履歴ID
      required: true
      schema:
        type: string
        format: uuid

  responses:
    "204":
      description: 正常時
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
    "404":
      $ref: "../../openapi.yaml#/components/responses/NotFound"
