get:
  operationId: getVocabularyCheckResults
  summary: ボキャブラリーチェック結果取得
  description: ボキャブラリーチェック結果一覧を取得する
  tags:
    - Vocabulary

  parameters:
    - in: query
      name: checkedAtFrom
      description: チェック日時From
      required: false
      schema:
        type: string
        format: date
    - in: query
      name: checkedAtTo
      description: チェック日時To
      required: false
      schema:
        type: string
        format: date
    - in: query
      name: severities
      description: 重要度
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - HIGH
            - MEDIUM
            - LOW
    - in: query
      name: statuses
      description: 確認ステータス
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - UNCHECKED
            - CHECKED

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../openapi.yaml#/components/schemas/VocabularyCheckResult"
          example:
            $ref: "../../examples/vocabulary-check-results/get.json"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
