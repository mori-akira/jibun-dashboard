get:
  operationId: getRamenReviewsById
  summary: ラーメン評価取得(ID)
  description: IDを指定してラーメン評価情報を取得する
  tags:
    - RamenReview

  parameters:
    - in: path
      name: ramenReviewId
      description: ラーメン評価ID
      required: true
      schema:
        type: string
        format: uuid

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/RamenReview"
          example:
            $ref: "../../examples/ramen-reviews/ramenReviewId/get.json"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
    "404":
      $ref: "../../openapi.yaml#/components/responses/NotFound"

put:
  operationId: putRamenReviewsById
  summary: ラーメン評価更新(ID)
  description: ラーメン評価情報を更新する
  tags:
    - RamenReview

  parameters:
    - in: path
      name: ramenReviewId
      description: ラーメン評価ID
      required: true
      schema:
        type: string
        format: uuid

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/RamenReviewBase"

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/RamenReviewId"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
    "404":
      $ref: "../../openapi.yaml#/components/responses/NotFound"

delete:
  operationId: deleteRamenReviewsById
  summary: ラーメン評価削除(ID)
  description: IDを指定してラーメン評価情報を削除する
  tags:
    - RamenReview

  parameters:
    - in: path
      name: ramenReviewId
      description: ラーメン評価ID
      required: true
      schema:
        type: string
        format: uuid

  responses:
    "204":
      description: 正常時
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
    "404":
      $ref: "../../openapi.yaml#/components/responses/NotFound"
