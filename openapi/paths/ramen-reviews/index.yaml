get:
  operationId: getRamenReviews
  summary: ラーメン評価一覧取得
  description: 検索条件を指定してラーメン評価情報を取得する
  tags:
    - RamenReview

  parameters:
    - in: query
      name: shopName
      description: 店名
      required: false
      schema:
        type: string
    - in: query
      name: ratingFrom
      description: 評価From
      required: false
      schema:
        type: number
        format: double
        minimum: 1.0
        maximum: 5.0
    - in: query
      name: ratingTo
      description: 評価To
      required: false
      schema:
        type: number
        format: double
        minimum: 1.0
        maximum: 5.0
    - in: query
      name: visitDateFrom
      description: 来店日From
      required: false
      schema:
        type: string
        format: date
    - in: query
      name: visitDateTo
      description: 来店日To
      required: false
      schema:
        type: string
        format: date

  responses:
    "200":
      description: 正常時
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../openapi.yaml#/components/schemas/RamenReview"
          example:
            $ref: "../../examples/ramen-reviews/get.json"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"

post:
  operationId: postRamenReviews
  summary: ラーメン評価登録
  description: ラーメン評価情報を登録する
  tags:
    - RamenReview

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/RamenReviewBase"

  responses:
    "201":
      description: 正常時
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/RamenReviewId"
    "400":
      $ref: "../../openapi.yaml#/components/responses/BadRequest"
