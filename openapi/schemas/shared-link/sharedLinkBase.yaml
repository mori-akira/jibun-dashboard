type: object
description: 共有リンク基本情報

required:
  - dataTypes
  - expiresAt

properties:
  dataTypes:
    description: 共有対象種別
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
        - salary
        - qualification
        - vocabulary

  expiresAt:
    description: 有効期限
    type: string
    format: date
