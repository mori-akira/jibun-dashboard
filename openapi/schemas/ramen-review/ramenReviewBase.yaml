type: object
description: ラーメン評価基本情報

required:
  - shopName
  - address
  - rating
  - visitDate

properties:
  shopName:
    description: 店名
    type: string
    minLength: 1
    maxLength: 128

  address:
    description: 住所
    type: string
    minLength: 1
    maxLength: 256

  latitude:
    description: 緯度
    type: number
    format: double

  longitude:
    description: 経度
    type: number
    format: double

  externalUrl:
    description: 外部サイトURL
    type: string
    format: uri
    maxLength: 512

  rating:
    description: 評価
    type: number
    format: double
    minimum: 1.0
    maximum: 5.0
    multipleOf: 0.1

  visitDate:
    description: 来店日
    type: string
    format: date

  comment:
    description: コメント
    type: string
    maxLength: 2048

  imageAssetIds:
    description: 画像アセットID一覧
    type: array
    maxItems: 5
    items:
      type: string
      format: uuid
