type: object
description: ボキャブラリークイズ履歴
allOf:
  - $ref: vocabularyQuizHistoryId.yaml
  - $ref: vocabularyQuizHistoryBase.yaml
  - type: object
    required:
      - answeredAt
      - correctCount
      - incorrectCount
    properties:
      answeredAt:
        description: 回答送信日時
        type: string
        format: date-time
      correctCount:
        description: 正答数
        type: integer
        minimum: 0
      incorrectCount:
        description: 誤答数
        type: integer
        minimum: 0
