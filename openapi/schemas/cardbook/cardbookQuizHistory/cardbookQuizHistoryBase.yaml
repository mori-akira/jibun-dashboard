type: object
description: カード帳クイズ履歴基本情報
required:
  - cardbookId
  - questionCount
  - direction
  - answers
properties:
  cardbookId:
    description: カード帳ID
    type: string
    format: uuid
  questionCount:
    description: 出題数
    type: integer
    minimum: 1
  direction:
    description: 出題方向
    type: string
    enum:
      - FRONT_TO_BACK
      - BACK_TO_FRONT
  answers:
    description: 回答リスト
    type: array
    items:
      $ref: cardbookQuizHistoryAnswer.yaml
    minItems: 1
