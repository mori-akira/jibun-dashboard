openapi: 3.0.3

info:
  version: 1.0.0
  title: 自分ダッシュボードAPI定義

tags:
  - name: Resource
    description: リソースAPI
  - name: User
    description: ユーザ情報API
  - name: Setting
    description: 設定情報API
  - name: File
    description: ファイルAPI
  - name: Salary
    description: 給与情報API
  - name: Qualification
    description: 資格情報API
  - name: Vocabulary
    description: ボキャブラリー情報API
  - name: SharedLink
    description: 共有リンクAPI
  - name: Share
    description: 共有データ取得API

security:
  - CognitoJwtAuth: []

servers:
  - url: http://localhost:4011/

paths:
  /resources/i18n/{localeCode}:
    $ref: "paths/resources/i18n/localeCode.yaml"
  /users:
    $ref: "paths/users/index.yaml"
  /users/password:
    $ref: "paths/users/password.yaml"
  /settings:
    $ref: "paths/settings/index.yaml"
  /files/upload-url:
    $ref: "paths/files/upload-url.yaml"
  /files/upload-mock:
    $ref: "paths/files/upload-mock.yaml"
  /files/user-assets/download-url:
    $ref: "paths/files/user-assets/download-url.yaml"
  /salaries:
    $ref: "paths/salaries/index.yaml"
  /salaries/{salaryId}:
    $ref: "paths/salaries/salaryId.yaml"
  /salaries/ocr-tasks:
    $ref: "paths/salaries/ocr-tasks/index.yaml"
  /salaries/ocr-tasks/{ocrTaskId}:
    $ref: "paths/salaries/ocr-tasks/ocrTaskId.yaml"
  /qualifications:
    $ref: "paths/qualifications/index.yaml"
  /qualifications/{qualificationId}:
    $ref: "paths/qualifications/qualificationId.yaml"
  /vocabularies:
    $ref: "paths/vocabularies/index.yaml"
  /vocabularies/{vocabularyId}:
    $ref: "paths/vocabularies/vocabularyId.yaml"
  /vocabulary-tags:
    $ref: "paths/vocabulary-tags/index.yaml"
  /vocabulary-tags/{vocabularyTagId}:
    $ref: "paths/vocabulary-tags/vocabularyTagId.yaml"
  /vocabulary-quiz-histories:
    $ref: "paths/vocabulary-quiz-histories/index.yaml"
  /vocabulary-quiz-histories/{quizHistoryId}:
    $ref: "paths/vocabulary-quiz-histories/quizHistoryId.yaml"
  /vocabulary-check-results:
    $ref: "paths/vocabulary-check-results/index.yaml"
  /vocabulary-check-results/{checkResultId}/status:
    $ref: "paths/vocabulary-check-results/checkResultId/status.yaml"
  /shared-links:
    $ref: "paths/shared-links/index.yaml"
  /shared-links/{token}:
    $ref: "paths/shared-links/token.yaml"
  /share/{token}/setting:
    $ref: "paths/share/token/setting.yaml"
  /share/{token}/salaries:
    $ref: "paths/share/token/salaries.yaml"
  /share/{token}/qualifications:
    $ref: "paths/share/token/qualifications.yaml"
  /share/{token}/vocabularies:
    $ref: "paths/share/token/vocabularies.yaml"
  /share/{token}/vocabulary-tags:
    $ref: "paths/share/token/vocabulary-tags.yaml"

components:
  securitySchemes:
    CognitoJwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    I18n:
      $ref: "schemas/resource/i18n.yaml"
    User:
      $ref: "schemas/user/user.yaml"
    UserId:
      $ref: "schemas/user/userId.yaml"
    UserBase:
      $ref: "schemas/user/userBase.yaml"
    Password:
      $ref: "schemas/user/password.yaml"
    Setting:
      $ref: "schemas/setting/setting.yaml"
    UploadUrl:
      $ref: "schemas/file/uploadUrl.yaml"
    DownloadUrl:
      $ref: "schemas/file/downloadUrl.yaml"
    Salary:
      $ref: "schemas/salary/salary.yaml"
    SalaryId:
      $ref: "schemas/salary/salaryId.yaml"
    SalaryBase:
      $ref: "schemas/salary/salaryBase.yaml"
    SalaryOcrTask:
      $ref: "schemas/salary/ocrTask/salaryOcrTask.yaml"
    SalaryOcrTaskId:
      $ref: "schemas/salary/ocrTask/salaryOcrTaskId.yaml"
    SalaryOcrTaskBase:
      $ref: "schemas/salary/ocrTask/salaryOcrTaskBase.yaml"
    Qualification:
      $ref: "schemas/qualification/qualification.yaml"
    QualificationId:
      $ref: "schemas/qualification/qualificationId.yaml"
    QualificationBase:
      $ref: "schemas/qualification/qualificationBase.yaml"
    Vocabulary:
      $ref: "schemas/vocabulary/vocabulary.yaml"
    VocabularyId:
      $ref: "schemas/vocabulary/vocabularyId.yaml"
    VocabularyBase:
      $ref: "schemas/vocabulary/vocabularyBase.yaml"
    VocabularyRequest:
      $ref: "schemas/vocabulary/vocabularyRequest.yaml"
    VocabularyTag:
      $ref: "schemas/vocabulary/vocabularyTag/vocabularyTag.yaml"
    VocabularyTagId:
      $ref: "schemas/vocabulary/vocabularyTag/vocabularyTagId.yaml"
    VocabularyTagBase:
      $ref: "schemas/vocabulary/vocabularyTag/vocabularyTagBase.yaml"
    VocabularyQuizHistory:
      $ref: "schemas/vocabulary/vocabularyQuizHistory/vocabularyQuizHistory.yaml"
    VocabularyQuizHistoryId:
      $ref: "schemas/vocabulary/vocabularyQuizHistory/vocabularyQuizHistoryId.yaml"
    VocabularyQuizHistoryBase:
      $ref: "schemas/vocabulary/vocabularyQuizHistory/vocabularyQuizHistoryBase.yaml"
    VocabularyQuizHistoryAnswer:
      $ref: "schemas/vocabulary/vocabularyQuizHistory/vocabularyQuizHistoryAnswer.yaml"
    VocabularyCheckResult:
      $ref: "schemas/vocabulary/vocabularyCheckResult/vocabularyCheckResult.yaml"
    VocabularyCheckResultId:
      $ref: "schemas/vocabulary/vocabularyCheckResult/vocabularyCheckResultId.yaml"
    VocabularyCheckResultBase:
      $ref: "schemas/vocabulary/vocabularyCheckResult/vocabularyCheckResultBase.yaml"
    VocabularyCheckResultStatus:
      $ref: "schemas/vocabulary/vocabularyCheckResult/vocabularyCheckResultStatus.yaml"
    SharedLink:
      $ref: "schemas/shared-link/sharedLink.yaml"
    SharedLinkToken:
      $ref: "schemas/shared-link/sharedLinkToken.yaml"
    SharedLinkBase:
      $ref: "schemas/shared-link/sharedLinkBase.yaml"
    ErrorInfo:
      $ref: "schemas/error/errorInfo.yaml"
  responses:
    BadRequest:
      description: パラメータ不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorInfo"
    Forbidden:
      description: 権限なし
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorInfo"
    NotFound:
      description: リソース不在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorInfo"
    Gone:
      description: リソース期限切れ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorInfo"
